<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL-LITTLE-BOY</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

:root{
    --green:#00ff66;
    --bg:#000;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:var(--green);
    font-family:'VT323', monospace;
    overflow:hidden;
    font-size:24px;
}

#terminal{
    width:100vw;
    height:100vh;
    overflow-y:auto;
    padding:20px;
    position:relative;
}

#terminal::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        transparent 0px,
        transparent 2px,
        rgba(0,255,100,.03) 3px,
        rgba(0,255,100,.03) 4px
    );
    pointer-events:none;
}

#terminal::after{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(
        circle,
        transparent 50%,
        rgba(0,0,0,.5) 100%
    );
    pointer-events:none;
}

.line{
    white-space:pre-wrap;
    margin-bottom:4px;
}

#input-container{
    display:flex;
    align-items:center;
}

.prompt{
    margin-right:10px;
}

#cmd{
    background:none;
    border:none;
    color:var(--green);
    font-family:'VT323', monospace;
    font-size:24px;
    outline:none;
    width:100%;
}

.glitch{
    animation:glitch .1s infinite;
}

@keyframes glitch{
    0%{transform:translate(1px);}
    50%{transform:translate(-1px);}
    100%{transform:translate(1px);}
}

</style>
</head>
<body>

<div id="terminal"></div>

<script>

const term = document.getElementById("terminal");

const discovered = JSON.parse(
localStorage.getItem("lb_discovered") || "[]"
);

function saveDiscovery(item){

    if(!discovered.includes(item)){
        discovered.push(item);
        localStorage.setItem(
            "lb_discovered",
            JSON.stringify(discovered)
        );
    }
}

function print(text=""){
    const div=document.createElement("div");
    div.className="line";
    div.textContent=text;
    term.appendChild(div);
    term.scrollTop=term.scrollHeight;
}

function multiline(text){
    text.trim().split("\n").forEach(print);
}

const diaries = {

"1945_08_18": `
DIÁRIO DE BEY

18 DE AGOSTO DE 1945

Foi no meio de sangue e morte,
na destruição de uma pequena cidade,
que eu vim para esse mundo.

Tudo que vi foi sofrimento.

Tudo que ouvi foi medo.
`,

"1946_08_18": `
18 DE AGOSTO DE 1946

Hoje me deram um nome.

BEY.

E também me deram um pequeno lobo.

PRESA.
`,

"1949_06_12": `
12 DE JUNHO DE 1949

Mamãe morreu.

Eu não entendia.

Se Deus é justo,
por que isso aconteceu?
`,

"1956_01_23": `
23 DE JANEIRO DE 1956

A floresta estava errada.

Escura.

Silenciosa.

E naquela noite...

eu perdi Presa.
`,

"1959_04_04": `
4 DE ABRIL DE 1959

Acordei em um asilo.

Metade do meu rosto
já não parecia humano.
`,

"1963_12_24": `
24 DE DEZEMBRO DE 1963

A igreja estava diferente.

Sangue.

Óleo.

Máscaras.

Meu pai não parecia mais meu pai.
`,

"1964_01_19": `
██████████████

ARQUIVO CORROMPIDO

"EU NUNCA VOU TE PERDOAR."

██████████████
`
};

const people = {

"BEY":`
Nome: Bey

Status:
Desconhecido

Observação:

"Eu queria ter continuado no escuro."
`,

"ERI":`
Nome: Eri

Irmã adotiva de Bey.
`,

"PRESA":`
Nome: Presa

Espécie:
Lobo

Status:
Falecido

"Me dava um propósito."
`,

"PASTOR":`
REGISTRO RESTRITO

ACESSO NEGADO
`
};

function createInput(){

    const container=document.createElement("div");

    container.id="input-container";

    container.innerHTML=`
        <span class="prompt">></span>
        <input id="cmd" autocomplete="off">
    `;

    term.appendChild(container);

    const input=document.getElementById("cmd");

    input.focus();

    input.addEventListener("keydown",e=>{

        if(e.key==="Enter"){

            const cmd=input.value.trim();

            container.remove();

            print("> " + cmd);

            execute(cmd);

            createInput();
        }

    });

}

function execute(raw){

    const cmd=raw.toUpperCase();

    if(cmd==="HELP"){

        multiline(`
COMANDOS

HELP
DIR
DIARIOS
PESSOAS
ABRIR
BUSCAR
STATUS
LIMPAR
MEMORIA
`);

        return;
    }

    if(cmd==="DIR"){

        multiline(`
DIRETÓRIOS

DIARIOS
PESSOAS
ARQUIVOS
REGISTROS
`);

        return;
    }

    if(cmd==="STATUS"){

        multiline(`
TERMINAL-LITTLE-BOY

STATUS: ONLINE

ARQUIVOS CORROMPIDOS: 14
`);

        return;
    }

    if(cmd==="DIARIOS"){

        Object.keys(diaries).forEach(print);

        return;
    }

    if(cmd==="PESSOAS"){

        Object.keys(people).forEach(print);

        return;
    }

    if(cmd==="MEMORIA"){

        multiline(`
LEMBRAR É UM PESADELO.
`);

        glitch();

        return;
    }

    if(cmd==="LIMPAR"){

        term.innerHTML="";
        return;
    }

    if(cmd.startsWith("ABRIR ")){

        const target = cmd.replace("ABRIR ","");

        if(diaries[target]){

            saveDiscovery(target);

            multiline(diaries[target]);

            return;
        }

        if(people[target]){

            multiline(people[target]);

            return;
        }

        print("ARQUIVO NÃO ENCONTRADO");
        return;
    }

    if(cmd.startsWith("BUSCAR ")){

        const termSearch=
            cmd.replace("BUSCAR ","");

        let found=[];

        Object.keys(diaries).forEach(key=>{

            if(
                diaries[key]
                .toUpperCase()
                .includes(termSearch)
            ){
                found.push(key);
            }

        });

        if(found.length){

            multiline(`
RESULTADOS:

${found.join("\n")}
`);

        }else{

            print("NENHUM RESULTADO.");
        }

        return;
    }

    print("COMANDO DESCONHECIDO");
}

function glitch(){

    document.body.classList.add("glitch");

    setTimeout(()=>{
        document.body.classList.remove("glitch");
    },1000);

}

async function boot(){

    const lines=[

"TERMINAL-LITTLE-BOY v7.1",
"",
"RECUPERANDO ARQUIVOS...",
"",
"DIÁRIO DE UM CAÇADOR SOLITÁRIO",
"",
"VERIFICANDO INTEGRIDADE...",
"",
"14 ARQUIVOS CORROMPIDOS",
"",
"CARREGANDO..."
];

    for(const line of lines){

        print(line);

        await new Promise(r=>
            setTimeout(r,300)
        );
    }

    print("");
    createInput();
}

boot();

</script>
</body>
</html>
